appId: com.git-safe-commit-tool
productName: Git Safe Commit Tool

directories:
  output: output

files:
  - electron/**
  - lib/**
  - dist/**
  - server.mjs
  - package.json
  - "!src/**"
  - "!test/**"
  - "!docs/**"
  - "!.agents/**"
  - "!.amo/**"
  - "!.codex/**"
  - "!.claude/**"
  - "!.kiro/**"
  - "!.omx/**"
  - "!output/**"
  - "!node_modules/.cache/**"
  - "!*.ps1"
  - "!*.bat"
  - "!README.md"
  - "!config.example.json"

win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
  sign: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Git Safe Commit Tool"
  deleteAppDataOnUninstall: false

artifactName: "git-safe-commit-${version}-setup.exe"

asar: true
